name: Nozhichki
options:
  bundleIdPrefix: com.nozhichki
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
targets:
  Nozhichki:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.nozhichki.game
        PRODUCT_NAME: Nozhichki
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: "YES"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
